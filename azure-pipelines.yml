trigger:
- main

variables:
  azureServiceConnectionId: 'f04a01e5-f9d8-4349-9559-669c6848cefc'
  webAppName: 'perfecto-backend'
  vmImageName: 'ubuntu-latest'
  environmentName: 'perfecto-backend'
  projectRoot: $(System.DefaultWorkingDirectory)
  pythonVersion: '3.11'

stages:
- stage: Build
  displayName: Build stage
  jobs:
  - job: BuildJob
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '$(pythonVersion)'
      displayName: 'Use Python $(pythonVersion)'

    - script: |
        python -m venv antenv
        source antenv/bin/activate
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
      workingDirectory: $(projectRoot)
      displayName: 'Install requirements'

    - task: ArchiveFiles@2
      displayName: 'Archive files'
      inputs:
        rootFolderOrFile: '$(projectRoot)'
        includeRootFolder: false
        archiveType: zip
        archiveFile: $(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip
        replaceExistingArchive: true

    - upload: $(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip
      displayName: 'Upload package'
      artifact: drop

- stage: Test
  displayName: 'Unit Tests'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: TestJob
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '$(pythonVersion)'
      displayName: 'Use Python $(pythonVersion)'

    - script: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest pytest-azurepipelines
      workingDirectory: $(projectRoot)
      displayName: 'Install dependencies'

    - script: |
        cd backend
        python -m pytest app/tests/test_services.py app/tests/test_users.py app/tests/test_validation.py -v --junitxml=../test-results.xml
      workingDirectory: $(projectRoot)
      displayName: 'Run unit tests'

    - task: PublishTestResults@2
      displayName: 'Publish test results'
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: 'test-results.xml'
        failTaskOnFailedTests: true
      condition: always()

- stage: LoadTest
  displayName: 'Load Tests'
  dependsOn: Test
  condition: succeeded()
  jobs:
  - job: LoadTestJob
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '$(pythonVersion)'
      displayName: 'Use Python $(pythonVersion)'

    - script: |
        python -m pip install --upgrade pip
        pip install locust
      workingDirectory: $(projectRoot)
      displayName: 'Install Locust'

    - script: |
        echo "Current directory:"
        pwd
        echo "Files in root:"
        ls -la
        echo "Finding locustfile:"
        find . -name "locust.py"
      workingDirectory: $(projectRoot)
      displayName: 'Debug - Find locustfile'

    - script: |
        locust \
          -f backend/app/tests/locust.py \
          --headless \
          --users 20 \
          --spawn-rate 5 \
          --run-time 60s \
          --host https://perfecto-backend-hdfbasgbgpgggwbp.polandcentral-01.azurewebsites.net \
          --csv=locust-results \
          --html=locust-report.html || true
      workingDirectory: $(projectRoot)
      displayName: 'Run Load Tests'

    - task: PublishPipelineArtifact@1
      displayName: 'Upload Load Test Results'
      inputs:
        targetPath: 'locust-results_stats.csv'
        artifact: 'locust-results'
      condition: always()

    - task: PublishPipelineArtifact@1
      displayName: 'Upload Load Test Report'
      inputs:
        targetPath: 'locust-report.html'
        artifact: 'locust-report'
      condition: always()

- stage: Deploy
  displayName: 'Deploy Web App'
  dependsOn: LoadTest
  condition: succeeded()
  jobs:
  - deployment: DeploymentJob
    pool:
      vmImage: $(vmImageName)
    environment: $(environmentName)
    strategy:
      runOnce:
        deploy:
          steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'
            displayName: 'Use Python version'

          - task: AzureWebApp@1
            displayName: 'Deploy Azure Web App : perfecto-backend'
            inputs:
              azureSubscription: $(azureServiceConnectionId)
              appName: $(webAppName)
              package: $(Pipeline.Workspace)/drop/$(Build.BuildId).zip